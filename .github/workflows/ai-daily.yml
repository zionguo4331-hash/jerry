name: AI Daily

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

jobs:
  ai-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ai-daily
          pip install -r requirements.txt

      - name: Run AI Daily
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SERVER_SEND_KEY: ${{ secrets.SERVER_SEND_KEY }}
        run: |
          cd ai-daily
          python main.py 2>&1 || echo "Exit code: $?"

      - name: Commit AI Daily files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 更新 AI 日报"
          file_pattern: "AI日报/*.md"