<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, sans-serif; width: 300px; padding: 10px; background: #f5f5f5; }
    h1 { font-size: 14px; text-align: center; margin: 0 0 10px; }
    .stats { display: flex; gap: 10px; margin-bottom: 10px; }
    .stat { flex: 1; background: white; padding: 10px; border-radius: 6px; text-align: center; }
    .stat-value { font-size: 20px; font-weight: bold; color: #1976d2; }
    .stat-label { font-size: 11px; color: #666; }
    .list { background: white; padding: 10px; border-radius: 6px; max-height: 180px; overflow-y: auto; margin-bottom: 10px; }
    .list-item { font-size: 11px; padding: 6px 0; border-bottom: 1px solid #eee; }
    .list-item:last-child { border-bottom: none; }
    .btn { padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 5px; }
    .btn-primary { background: #1976d2; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .empty { color: #999; text-align: center; padding: 20px; font-size: 11px; }
  </style>
</head>
<body>
  <h1>🛍️ 淘宝竞品监控</h1>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="count">0</div><div class="stat-label">监控商品</div></div>
  </div>
  <div class="list" id="list"><div class="empty">加载中...</div></div>
  <div>
    <button id="refreshBtn" class="btn btn-primary">🔄刷新</button>
    <button id="exportBtn" class="btn btn-secondary">📄导出</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
